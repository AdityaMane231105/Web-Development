<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Learning Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 40px; background-color: #f4f4f9; }
        .container { background: white; border: 2px solid #333; padding: 25px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #007BFF; }
        iframe { border: 3px solid #28a745; border-radius: 8px; margin-top: 15px; width: 100%; height: 300px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Web Development Topics</h1>
        <p>Explore essential skills for modern developers:</p>
        <ul>
            <li><strong>Frontend:</strong> HTML, CSS, JavaScript</li>
            <li><strong>Backend:</strong> Node.js, Python, Databases</li>
        </ul>

       <hr>

        <h2>Embedded Developer Tool</h2>
        <p>This frame displays your custom frontend checklist:</p>
        
        <iframe
            title="Internal Checklist"
            srcdoc="
                <style>
                    body { font-family: sans-serif; background-color: #e9ecef; padding: 20px; }
                    h3 { color: #28a745; margin-bottom: 10px; }
                    ul { list-style: none; padding-left: 0; }
                    li { margin: 5px 0; }
                    .footer { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; font-weight: bold; color: #555; }
                </style>
                <h3>Frontend Checklist</h3>
                <ul>
                    <li>? Semantic HTML5</li>
                    <li>? Responsive CSS Flexbox</li>
                    <li>? Modern ES6+ JavaScript</li>
                </ul>
                <div class='footer'>End of Developer Guide</div>
            ">
        </iframe>
    </div>

</body>
</html>
